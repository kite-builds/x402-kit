name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: build TS packages (emit dist for typecheck + tests)
        run: npm run build -w x402-kit -w @x402-kit/cli -w @x402-kit/dashboard
      - name: typecheck (server, cli, dashboard, openai-paywall)
        run: |
          npx tsc --noEmit -p packages/server
          npx tsc --noEmit -p packages/cli
          npx tsc --noEmit -p packages/dashboard
          npx tsc --noEmit -p examples/openai-paywall
      - run: npm test
